# MySQL. Versions 5.5.8 and up are supported.
#   gem install mysql2
#
#   Ensure the MySQL 2 gem is defined in your Gemfile
#   gem "mysql2"
#
default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: crm2user
  password: 1234
  host: localhost
  port: 3306
  sslverify: false
  sslkey:
  sslcert:
  sslca:

development:
  <<: *default
  database: crm2

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
  database: storage/test.sqlite3

# Store production database connection details
production:
  primary:
    <<: *default
    database: crm2_production
  cache:
    <<: *default
    database: crm2_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: crm2_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: crm2_production_cable
    migrations_paths: db/cable_migrate
